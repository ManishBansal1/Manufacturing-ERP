{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>Edit Item</h2>

<form method="POST">

<div class="mb-3">

<label>Item Code</label>

<input
type="text"
name="item_code"
value="{{ item.item_code }}"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Item Name</label>

<input
type="text"
name="item_name"
value="{{ item.item_name }}"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Item Type</label>

<select
name="item_type"
class="form-control">

<option value="Raw Material"
{% if item.item_type == "Raw Material" %}
selected
{% endif %}>
Raw Material
</option>

<option value="Intermediate Material"
{% if item.item_type == "Intermediate Material" %}
selected
{% endif %}>
Intermediate Material
</option>

<option value="Assembled Goods"
{% if item.item_type == "Assembled Goods" %}
selected
{% endif %}>
Assembled Goods
</option>

<option value="Finished Goods"
{% if item.item_type == "Finished Goods" %}
selected
{% endif %}>
Finished Goods
</option>

<option value="Scrap"
{% if item.item_type == "Scrap" %}
selected
{% endif %}>
    Scrap
</option>

</select>

</div>

<div class="mb-3">

<label>Unit</label>

<input
type="text"
name="unit"
value="{{ item.unit }}"
class="form-control">

</div>

<div class="mb-3">

<label>

HSN Code

</label>

<input
    type="text"
    name="hsn_code"
    value="{{ item.hsn_code }}"
    class="form-control">

</div>

<div class="mb-3">

<label>

GST Rate %

</label>

<input
    type="number"
    step="0.01"
    name="gst_rate"
    value="{{ item.gst_rate }}"
    class="form-control">

</div>

<div class="mb-3">

<label>Production Stage</label>

<select
    name="production_stage_id"
    class="form-control">

    <option value="">
        -- Select Stage --
    </option>

    {% for stage in stage_list %}

    <option
        value="{{ stage.id }}"
        {% if item.production_stage_id == stage.id %}
        selected
        {% endif %}
    >

        {{ stage.stage_no }} -
        {{ stage.stage_name }}

    </option>

    {% endfor %}

</select>

</div>

<div class="mb-3">

<label>Finished Good Mapping</label>

<select
    name="finished_good_id"
    class="form-control">

    <option value="">
        -- Select Finished Good --
    </option>

    {% for fg in fg_list %}

    <option
        value="{{ fg.id }}"
        {% if item.finished_good_id == fg.id %}
        selected
        {% endif %}
    >

        {{ fg.fg_name }}

    </option>

    {% endfor %}

</select>

</div>

<button
type="submit"
class="btn btn-success">

Update

</button>

<a
href="/items"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

{% endblock %}
