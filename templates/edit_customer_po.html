{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>

    Add Customer Purchase Order

</h2>

<form method="POST">

<div class="card mb-3">

<div class="card-header">

    Customer PO Details

</div>

<div class="card-body">

<div class="row">

<div class="col-md-4 mb-3">

    <label>

        Customer

    </label>

    <select
        name="customer_id"
        class="form-control"
        required>

        {% for customer in customer_list %}

        <option
            value="{{ customer.id }}"
            {% if customer.id == po.customer_id %}
            selected
            {% endif %}>

            {{ customer.customer_name }}

        </option>

        {% endfor %}

    </select>

</div>

<div class="col-md-4 mb-3">

    <label>

        Customer PO Number

    </label>

<input
type="text"
name="customer_po_no"
class="form-control"
value="{{ po.customer_po_no }}"
required>

</div>

<div class="col-md-4 mb-3">

<label>

Customer PO Date

</label>

<input
type="date"
name="customer_po_date"
class="form-control"
value="{{ po.customer_po_date }}"
required>

</div>

<div class="col-md-4 mb-3">

<label>

Order Received Date

</label>

<input
type="date"
name="order_received_date"
class="form-control"
value="{{ po.order_received_date }}"
required>

</div>

<div class="col-md-4 mb-3">

<label>

Payment Terms

</label>

<input
type="text"
name="payment_terms"
class="form-control"
value="{{ po.payment_terms }}">

</div>

<div class="col-md-4 mb-3">

<label>

Freight Terms

</label>

<input
type="text"
name="freight_terms"
class="form-control"
value="{{ po.freight_terms }}">

</div>

<div class="col-md-12">

<label>

Remarks

</label>

<textarea
name="remarks"
class="form-control">{{ po.remarks }}</textarea>

</div>

</div>

</div>

</div>


<div class="card">

<div class="card-header">

Customer PO Items

</div>

<div class="card-body">

<table
class="table table-bordered">

<thead>

<tr>

<th>

PO Line

</th>

<th>

Finished Good

</th>

<th>

Qty

</th>

<th>

Rate

</th>

<th>

Freight

</th>

<th>

GST %

</th>

<th>

Basic

</th>

<th>

GST

</th>

<th>

Total

</th>

<th>

Delivery Date

</th>

<th>

</th>

</tr>

</thead>



<tbody id="tableBody">

{% for row in po.details %}

<tr>

<td>

<input
type="text"
name="line_no"
class="form-control"
value="{{ row.line_no }}">

</td>

<td>

<select
name="finished_good_id"
class="form-control fg">

{% for fg in fg_list %}

<option

value="{{ fg.id }}"

{% if fg.id == row.finished_good_id %}

selected

{% endif %}>

{{ fg.fg_code }} - {{ fg.fg_name }}

</option>

{% endfor %}

</select>

</td>

<td>

<input

type="number"

step="0.001"

name="qty"

class="form-control qty"

value="{{ row.qty }}">

</td>

<td>

<input

type="number"

step="0.01"

name="rate"

class="form-control rate"

value="{{ row.rate }}">

</td>

<td>

<input

type="number"

step="0.01"

name="freight"

class="form-control freight"

value="{{ row.freight }}">

</td>

<td>

<input

type="number"

step="0.01"

name="gst_rate"

class="form-control gstRate"

value="{{ row.gst_rate }}">

</td>

<td>

<input

name="basic_amount"

class="form-control basic"

readonly

value="{{ row.basic_amount }}">

</td>

<td>

<input

name="gst_amount"

class="form-control gst"

readonly

value="{{ row.gst_amount }}">

</td>

<td>

<input

name="total_amount"

class="form-control total"

readonly

value="{{ row.total_amount }}">

</td>

<td>

<input

type="date"

name="delivery_date"

class="form-control"

value="{{ row.delivery_date }}">

</td>

<td>

<button

type="button"

class="btn btn-danger"

onclick="removeRow(this)">

X

</button>

</td>

</tr>

{% endfor %}

</tbody>

</table>

<button

type="button"

class="btn btn-primary"

onclick="addRow()">

Add Item

</button>

</div>

</div>

<br>

<button
type="submit"
class="btn btn-success">

Save Customer PO

</button>

<a
href="/customer-po"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

<script>

let rowNo = 0;

function addRow(){

    rowNo++;

    let html = `

    <tr>

        <td>

            <input
            type="text"
            name="line_no"
            class="form-control">

        </td>

        <td>

            <select
            name="finished_good_id"
            class="form-control fg">

                <option value="">

                    Select Finished Good

                </option>

                {% for fg in fg_list %}

                <option

                value="{{ fg.id }}">

                {{ fg.fg_code }} - {{ fg.fg_name }}

                </option>

                {% endfor %}

            </select>

        </td>

        <td>

            <input
            type="number"
            step="0.001"
            name="qty"
            class="form-control qty">

        </td>

        <td>

            <input
            type="number"
            step="0.01"
            name="rate"
            class="form-control rate">

        </td>

        <td>

            <input
            type="number"
            step="0.01"
            name="freight"
            value="0"
            class="form-control freight">

        </td>

        <td>

            <input
            type="number"
            step="0.01"
            name="gst_rate"
            value="18"
            class="form-control gstRate">

        </td>

        <td>

            <input
            name="basic_amount"
            class="form-control basic"
            readonly>

        </td>

        <td>

            <input
            name="gst_amount"
            class="form-control gst"
            readonly>

        </td>

        <td>

            <input
            name="total_amount"
            class="form-control total"
            readonly>

        </td>

        <td>

            <input
            type="date"
            name="delivery_date"
            class="form-control">

        </td>

        <td>

            <button

            type="button"

            class="btn btn-danger"

            onclick="removeRow(this)">

            X

            </button>

        </td>

    </tr>

    `;

    document

    .getElementById("tableBody")

    .insertAdjacentHTML(

        "beforeend",

        html

    );

    initializeRows();

}

function initializeRows(){

    document

    .querySelectorAll(

        ".qty,.rate,.freight,.gstRate"

    )

    .forEach(function(ctrl){

        ctrl.oninput = calculateTotals;

    });

}

function calculateTotals(){

    document

    .querySelectorAll("#tableBody tr")

    .forEach(function(row){

        let qty = parseFloat(

            row.querySelector(".qty").value

        ) || 0;

        let rate = parseFloat(

            row.querySelector(".rate").value

        ) || 0;

        let freight = parseFloat(

            row.querySelector(".freight").value

        ) || 0;

        let gstRate = parseFloat(

            row.querySelector(".gstRate").value

        ) || 0;

        let basic = qty * (rate + freight);

        let gst = basic * gstRate / 100;

        let total = basic + gst;

        row.querySelector(".basic").value =
            basic.toFixed(2);

        row.querySelector(".gst").value =
            gst.toFixed(2);

        row.querySelector(".total").value =
            total.toFixed(2);

    });

}



function removeRow(btn){

    btn.closest("tr").remove();

    calculateTotals();

}

window.onload=function(){

    initializeRows();

}

</script>

{% endblock %}
