{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>Edit Recipe</h2>

<form method="POST">

<div class="mb-3">

<label>Recipe Name</label>

<input
    type="text"
    name="recipe_name"
    class="form-control"
    value="{{ recipe.recipe_name }}"
    required>

</div>

<div class="mb-3">

<label>Output Item</label>

<select
    name="output_item_id"
    class="form-control"
    required>

    {% for item in item_list %}

    <option
        value="{{ item.id }}"
        {% if item.id == recipe.output_item_id %}
        selected
        {% endif %}
    >
        {{ item.item_name }}
    </option>

    {% endfor %}

</select>

</div>

<div class="mb-3">

<label>Production Stage</label>

<select
    name="production_stage_id"
    class="form-control"
    required>

    {% for stage in stage_list %}

    <option
        value="{{ stage.id }}"
        {% if stage.id == recipe.production_stage_id %}
        selected
        {% endif %}
    >
        {{ stage.stage_no }} - {{ stage.stage_name }}
    </option>

    {% endfor %}

</select>

</div>

<div class="mb-3">

<label>Output Qty</label>

<input
    type="number"
    step="0.001"
    name="output_qty"
    class="form-control"
    value="{{ recipe.output_qty }}"
    required>

</div>

<button
    type="submit"
    class="btn btn-success">

    Update

</button>

<a
    href="/recipes"
    class="btn btn-secondary">

    Cancel

</a>

</form>

</div>

{% endblock %}
