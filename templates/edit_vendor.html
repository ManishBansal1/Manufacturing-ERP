{% extends "base.html" %}

{% block content %}

<h2>

    Edit Vendor

</h2>

<form method="POST">

<div class="mb-3">

<label>

Vendor Code

</label>

<input
    type="text"
    class="form-control"
    value="V{{ '%05d'|format(vendor.id) }}"
    readonly>

</div>

<div class="mb-3">

<label>

Vendor Name

</label>

<input
    type="text"
    name="vendor_name"
    value="{{ vendor.vendor_name }}"
    class="form-control"
    required>

</div>

<div class="row">

<div class="col-md-6">

<div class="mb-3">

<label>

Contact Person

</label>

<input
    type="text"
    name="contact_person"
    value="{{ vendor.contact_person }}"
    class="form-control">

</div>

</div>

<div class="col-md-6">

<div class="mb-3">

<label>

Mobile

</label>

<input
    type="text"
    name="mobile"
    value="{{ vendor.mobile }}"
    class="form-control">

</div>

</div>

</div>

<div class="row">

<div class="col-md-6">

<div class="mb-3">

<label>

Email

</label>

<input
    type="email"
    name="email"
    value="{{ vendor.email }}"
    class="form-control">

</div>

</div>

<div class="col-md-6">

<div class="mb-3">

<label>

GST Number

</label>

<input
    type="text"
    name="gst_no"
    value="{{ vendor.gst_no }}"
    class="form-control">

</div>

</div>

</div>

<div class="row">

<div class="col-md-6">

<div class="mb-3">

<label>

PAN Number

</label>

<input
    type="text"
    name="pan_no"
    value="{{ vendor.pan_no }}"
    class="form-control">

</div>

</div>

<div class="col-md-6">

<div class="mb-3">

<label>

Pincode

</label>

<input
    type="text"
    name="pincode"
    value="{{ vendor.pincode }}"
    class="form-control">

</div>

</div>

</div>

<div class="mb-3">

<label>

Address

</label>

<textarea
    name="address"
    rows="3"
    class="form-control">{{ vendor.address }}</textarea>

</div>

<div class="row">

<div class="col-md-4">

<div class="mb-3">

<label>

City

</label>

<input
    type="text"
    name="city"
    value="{{ vendor.city }}"
    class="form-control">

</div>

</div>

<div class="col-md-4">

<div class="mb-3">

<label>

State

</label>

<input
    type="text"
    name="state"
    value="{{ vendor.state }}"
    class="form-control">

</div>

</div>

<div class="col-md-4">

<div class="mb-3">

<label>

Country

</label>

<input
    type="text"
    name="country"
    value="{{ vendor.country }}"
    class="form-control">

</div>

</div>

</div>

<div class="form-check mb-3">

<input
    type="checkbox"
    class="form-check-input"
    id="active"
    name="active"
    {% if vendor.active %}checked{% endif %}>

<label
    class="form-check-label"
    for="active">

    Active

</label>

</div>

<button
    type="submit"
    class="btn btn-success">

    Update Vendor

</button>

<a
    href="/vendors"
    class="btn btn-secondary">

    Cancel

</a>

</form>

{% endblock %}
