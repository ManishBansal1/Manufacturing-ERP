{% extends "base.html" %}

{% block content %}

<h2>

Opening Stock Entry

</h2>

<form method="POST">

<div class="mb-3">

<label>

Opening Date

</label>

<input
type="date"
name="opening_date"
class="form-control"
required>

</div>

<div class="mb-3">

<label>

Location

</label>

<select
name="location_id"
class="form-control"
required>

{% for location in location_list %}

<option value="{{ location.id }}">

{{ location.location_name }}

</option>

{% endfor %}

</select>

</div>

<table
class="table table-bordered"
id="openingTable">

<thead>

<tr>
    <th>Item</th>

    <th width="120">
        Qty
    </th>

    <th width="120">
        Rate
    </th>

    <th width="150">
        Value
    </th>

    <th width="100">
        Unit
    </th>

    <th width="80">
        Action
    </th>
</tr>

</thead>

<tbody id="openingBody">

</tbody>

</table>

<button
type="button"
class="btn btn-primary"
onclick="addRow()">

+ Add Row

</button>

<div class="mt-3">

<label>

Remarks

</label>

<textarea
name="remarks"
class="form-control"></textarea>

</div>

<br>

<button
type="submit"
class="btn btn-success">

Save Opening Stock

</button>

</form>

<script>

function addRow() {

    let row = `

<tr>

<td>

<select
name="item_id"
class="form-control item-select">

{% for item in item_list %}

<option
value="{{ item.id }}"
data-unit="{{ item.unit }}">

{{ item.item_name }}

</option>

{% endfor %}

</select>

</td>

<td>

<input
type="number"
step="0.0001"
name="qty"
class="form-control qty">

</td>

<td>

<input
type="number"
step="0.0001"
name="rate"
class="form-control rate">

</td>

<td>

<input
type="number"
step="0.01"
name="value"
class="form-control value"
readonly>

</td>

<td>

<input
type="text"
class="form-control unit-box"
readonly>

</td>

<td>

<button
type="button"
class="btn btn-danger btn-sm"
onclick="deleteRow(this)">

Delete

</button>

</td>

</tr>

`;

    document
        .getElementById("openingBody")
        .insertAdjacentHTML(
            "beforeend",
            row
        );

    updateUnits();

}

function deleteRow(btn) {

    btn.closest("tr").remove();

}

function updateUnits() {

    document
        .querySelectorAll(".item-select")
        .forEach(function(select){

            let option =
                select.options[
                    select.selectedIndex
                ];

            let unit =
                option.dataset.unit;

            select
                .closest("tr")
                .querySelector(".unit-box")
                .value = unit;

        });

}

document.addEventListener(
    "change",
    function(e){

        if(
            e.target.classList.contains(
                "item-select"
            )
        ){

            updateUnits();

        }

    }
);

document.addEventListener("input", function(e){

    if(
        e.target.classList.contains("qty") ||
        e.target.classList.contains("rate")
    ){

        let row = e.target.closest("tr");

        let qty =
            parseFloat(
                row.querySelector(".qty").value
            ) || 0;

        let rate =
            parseFloat(
                row.querySelector(".rate").value
            ) || 0;

        row.querySelector(".value").value =
            (qty * rate).toFixed(2);

    }

});

window.onload = function(){

    addRow();

}

</script>

{% endblock %}
