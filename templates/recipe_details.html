<h2>{{ recipe.recipe_name }}</h2>

<form
method="POST"
action="/recipes/details/{{ recipe.id }}/save">

<h4>Input Materials</h4>

<table class="table table-bordered">

<thead>

<tr>

<th>Item</th>
<th>Qty</th>

</tr>

</thead>

<tbody>

{% for row in inputs %}

<tr>

<td>

<select
name="input_item_id"
class="form-control">

{% for item in item_list %}

<option
value="{{ item.id }}"
{% if item.id == row.input_item_id %}
selected
{% endif %}
>

{{ item.item_name }}

</option>

{% endfor %}

</select>

</td>

<td>

<input
type="number"
step="0.001"
name="input_qty"
value="{{ row.input_qty }}"
class="form-control">

</td>

</tr>

{% endfor %}

<tr>

<td>

<select
name="input_item_id"
class="form-control">

<option value="">
Select Item
</option>

{% for item in item_list %}

<option value="{{ item.id }}">
{{ item.item_name }}
</option>

{% endfor %}

</select>

</td>

<td>

<input
type="number"
step="0.001"
name="input_qty"
class="form-control">

</td>

</tr>

</tbody>

</table>

<hr>

<h4>Byproducts / Scrap</h4>

<table class="table table-bordered">

<thead>

<tr>

<th>Item</th>
<th>Qty</th>

</tr>

</thead>

<tbody>

{% for row in byproducts %}

<tr>

<td>

<select
name="byproduct_item_id"
class="form-control">

{% for item in item_list %}

<option
value="{{ item.id }}"
{% if item.id == row.byproduct_item_id %}
selected
{% endif %}
>

{{ item.item_name }}

</option>

{% endfor %}

</select>

</td>

<td>

<input
type="number"
step="0.001"
name="byproduct_qty"
value="{{ row.byproduct_qty }}"
class="form-control">

</td>

</tr>

{% endfor %}

<tr>

<td>

<select
name="byproduct_item_id"
class="form-control">

<option value="">
Select Item
</option>

{% for item in item_list %}

<option value="{{ item.id }}">
{{ item.item_name }}
</option>

{% endfor %}

</select>

</td>

<td>

<input
type="number"
step="0.001"
name="byproduct_qty"
class="form-control">

</td>

</tr>

</tbody>

</table>

<button
type="submit"
class="btn btn-success">

Save BOM

</button>

</form>
