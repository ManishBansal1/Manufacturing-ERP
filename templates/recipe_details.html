<h2>{{ recipe.recipe_name }}</h2>

<form
method="POST"
action="/recipes/details/{{ recipe.id }}/save">

<h4>Input Materials</h4>

<table
    class="table table-bordered"
    id="inputTable">

    <thead>

        <tr>

            <th>Item</th>
            <th width="120">Qty</th>
            <th width="100">Unit</th>
            <th width="80">Action</th>

        </tr>

    </thead>

    <tbody>

    {% for row in input_rows %}

        <tr>

            <td>

                <select
                    name="input_item_id"
                    class="form-control item-select">

                    {% for item in item_list %}

                    <option
                        value="{{ item.id }}"
                        data-unit="{{ item.unit }}"
                        {% if row.input_item_id == item.id %}
                        selected
                        {% endif %}>

                        {{ item.item_name }}

                    </option>

                    {% endfor %}

                </select>

            </td>

            <td>

                <input
                    type="number"
                    step="0.0001"
                    name="input_qty"
                    value="{{ row.input_qty }}"
                    class="form-control">

            </td>

            <td>

                <input
                    type="text"
                    value="{{ row.input_item.unit }}"
                    class="form-control unit-box"
                    readonly>

            </td>

            <td>

                <button
                    type="button"
                    class="btn btn-danger btn-sm"
                    onclick="deleteRow(this)">

                    Delete

                </button>

        </td>

        </tr>

    {% endfor %}

    </tbody>

</table>

<button
    type="button"
    class="btn btn-primary"
    onclick="addInputRow()">

    + Add Input Material

</button>

<h4 class="mt-4">

    Byproducts / Scrap

</h4>

<table
    class="table table-bordered"
    id="byproductTable">

    <thead>

        <tr>

            <th>Item</th>
            <th width="120">Qty</th>
            <th width="100">Unit</th>
            <th width="80">Action</th>

        </tr>

    </thead>

    <tbody>

    {% for row in byproduct_rows %}

        <tr>

            <td>

                <select
                    name="byproduct_item_id"
                    class="form-control item-select">

                    {% for item in item_list %}

                    <option
                        value="{{ item.id }}"
                        data-unit="{{ item.unit }}"
                        {% if row.byproduct_item_id == item.id %}
                        selected
                        {% endif %}>

                        {{ item.item_name }}

                    </option>

                    {% endfor %}

                </select>

            </td>

            <td>

                <input
                    type="number"
                    step="0.0001"
                    name="byproduct_qty"
                    value="{{ row.byproduct_qty }}"
                    class="form-control">

            </td>

            <td>

                <input
                    type="text"
                    value="{{ row.byproduct_item.unit }}"
                    class="form-control unit-box"
                    readonly>

            </td>

            <td>

                <button
                    type="button"
                    class="btn btn-danger btn-sm"
                    onclick="deleteRow(this)">

                    Delete

                </button>

            </td>

        </tr>

    {% endfor %}

    </tbody>

</table>

<button
    type="button"
    class="btn btn-warning"
    onclick="addByproductRow()">

    + Add Scrap

</button>

<button
type="submit"
class="btn btn-success">

Save BOM

</button>

<script>

function addInputRow() {

    let row = `
    <tr>

        <td>

            <select
                name="input_item_id"
                class="form-control item-select">

                {% for item in item_list %}

                <option
                    value="{{ item.id }}"
                    data-unit="{{ item.unit }}">

                    {{ item.item_name }}

                </option>

                {% endfor %}

            </select>

        </td>

        <td>

            <input
                type="number"
                step="0.0001"
                name="input_qty"
                class="form-control">

        </td>

        <td>

            <input
                type="text"
                value=""
                class="form-control unit-box"
                readonly>

        </td>

        <td>

            <button
                type="button"
                class="btn btn-danger btn-sm"
                onclick="deleteRow(this)">

                Delete

            </button>

        </td>

    </tr>
    `;

    document
        .querySelector("#inputTable tbody")
        .insertAdjacentHTML(
            "beforeend",
            row
        );
}

function addByproductRow() {

    let row = `
    <tr>

        <td>

            <select
                name="byproduct_item_id"
                class="form-control item-select">

                {% for item in item_list %}

                <option
                    value="{{ item.id }}"
                    data-unit="{{ item.unit }}">

                    {{ item.item_name }}

                </option>

                {% endfor %}

            </select>

        </td>

        <td>

            <input
                type="number"
                step="0.0001"
                name="byproduct_qty"
                class="form-control">

        </td>

        <td>

            <input
                type="text"
                value=""
                class="form-control unit-box"
                readonly>

        </td>

        <td>

            <button
                type="button"
                class="btn btn-danger btn-sm"
                onclick="deleteRow(this)">

                Delete

            </button>

        </td>

    </tr>
    `;

    document
        .querySelector("#byproductTable tbody")
        .insertAdjacentHTML(
            "beforeend",
            row
        );
}

function deleteRow(btn) {

    btn.closest("tr").remove();

}

document.addEventListener(
    "change",
    function(e) {

        if (
            e.target.classList.contains(
                "item-select"
            )
        ) {

            let selectedOption =
                e.target.options[
                    e.target.selectedIndex
                ];

            let unit =
                selectedOption.dataset.unit;

            let row =
                e.target.closest("tr");

            row.querySelector(
                ".unit-box"
            ).value = unit;
        }
    }
);

</script>

</form>
