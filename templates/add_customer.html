{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>

Add Customer

</h2>

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label>

Customer Name

</label>

<input
type="text"
name="customer_name"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>

Contact Person

</label>

<input
type="text"
name="contact_person"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label>

Mobile

</label>

<input
type="text"
name="mobile"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label>

Email

</label>

<input
type="email"
name="email"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label>

GST No

</label>

<input
type="text"
name="gst_no"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label>

PAN No

</label>

<input
type="text"
name="pan_no"
class="form-control">

</div>

<div class="col-md-8 mb-3">

<label>

Address

</label>

<input
type="text"
name="address"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label>

City

</label>

<input
type="text"
name="city"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label>

State

</label>

<input
type="text"
name="state"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label>

Country

</label>

<input
type="text"
name="country"
value="India"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label>

Pincode

</label>

<input
type="text"
name="pincode"
class="form-control">

</div>

<div class="col-md-3 mb-3">

<label>

Credit Days

</label>

<input
type="number"
name="credit_days"
value="30"
class="form-control">

</div>

<div class="col-md-3 mb-3">

<label>

Credit Limit

</label>

<input
type="number"
step="0.01"
name="credit_limit"
value="0"
class="form-control">

</div>

<div class="col-md-3 mt-4">

<div class="form-check">

<input
type="checkbox"
name="active"
class="form-check-input"
checked>

<label
class="form-check-label">

Active

</label>

</div>

</div>

</div>

<button
type="submit"
class="btn btn-success">

Save Customer

</button>

<a
href="/customers"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

{% endblock %}
