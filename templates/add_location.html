{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>Add Location</h2>

<form method="POST">

<div class="mb-3">

<label>Location Code</label>

<input
type="text"
name="location_code"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Location Name</label>

<input
type="text"
name="location_name"
class="form-control"
required>

</div>

<button
type="submit"
class="btn btn-success">

Save

</button>

</form>

</div>

{% endblock %}
