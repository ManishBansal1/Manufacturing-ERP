{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>Edit Customer</h2>

<form method="POST">

<div class="row">

<div class="col-md-6 mb-3">

<label>Customer Name</label>

<input
type="text"
name="customer_name"
class="form-control"
value="{{ customer.customer_name }}"
required>

</div>

<div class="col-md-6 mb-3">

<label>Contact Person</label>

<input
type="text"
name="contact_person"
class="form-control"
value="{{ customer.contact_person }}">

</div>

<div class="col-md-4 mb-3">

<label>Mobile</label>

<input
type="text"
name="mobile"
class="form-control"
value="{{ customer.mobile }}">

</div>

<div class="col-md-4 mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
value="{{ customer.email }}">

</div>

<div class="col-md-4 mb-3">

<label>GST No</label>

<input
type="text"
name="gst_no"
class="form-control"
value="{{ customer.gst_no }}">

</div>

<div class="col-md-4 mb-3">

<label>PAN No</label>

<input
type="text"
name="pan_no"
class="form-control"
value="{{ customer.pan_no }}">

</div>

<div class="col-md-8 mb-3">

<label>Address</label>

<input
type="text"
name="address"
class="form-control"
value="{{ customer.address }}">

</div>

<div class="col-md-4 mb-3">

<label>City</label>

<input
type="text"
name="city"
class="form-control"
value="{{ customer.city }}">

</div>

<div class="col-md-4 mb-3">

<label>State</label>

<input
type="text"
name="state"
class="form-control"
value="{{ customer.state }}">

</div>

<div class="col-md-4 mb-3">

<label>Country</label>

<input
type="text"
name="country"
class="form-control"
value="{{ customer.country }}">

</div>

<div class="col-md-4 mb-3">

<label>Pincode</label>

<input
type="text"
name="pincode"
class="form-control"
value="{{ customer.pincode }}">

</div>

<div class="col-md-3 mb-3">

<label>Credit Days</label>

<input
type="number"
name="credit_days"
class="form-control"
value="{{ customer.credit_days }}">

</div>

<div class="col-md-3 mb-3">

<label>Credit Limit</label>

<input
type="number"
step="0.01"
name="credit_limit"
class="form-control"
value="{{ customer.credit_limit }}">

</div>

<div class="col-md-3 mt-4">

<div class="form-check">

<input
type="checkbox"
name="active"
class="form-check-input"
{% if customer.active %}checked{% endif %}>

<label class="form-check-label">

Active

</label>

</div>

</div>

</div>

<button
class="btn btn-success">

Update Customer

</button>

<a
href="/customers"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

{% endblock %}
