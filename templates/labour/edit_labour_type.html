{% extends "base.html" %}

{% block content %}

<div class="container mt-3">

<div class="card shadow">

<div class="card-header bg-warning text-dark">

<h4>Edit Labour Type</h4>

</div>

<div class="card-body">

<form method="POST">

<div class="row">

<div class="col-md-4 mb-3">

<label>Type Code</label>

<input
type="text"
name="type_code"
class="form-control"
value="{{ labour_type.type_code }}"
required>

</div>

<div class="col-md-8 mb-3">

<label>Type Name</label>

<input
type="text"
name="type_name"
class="form-control"
value="{{ labour_type.type_name }}"
required>

</div>

</div>

<div class="mb-3">

<label>Description</label>

<textarea
name="description"
rows="3"
class="form-control">{{ labour_type.description }}</textarea>

</div>

<div class="form-check mb-3">

<input
class="form-check-input"
type="checkbox"
name="active"
{% if labour_type.active %}checked{% endif %}>

<label class="form-check-label">

Active

</label>

</div>

<button
type="submit"
class="btn btn-primary">

Update

</button>

<a
href="{{ url_for('labour.labour_types') }}"
class="btn btn-secondary">

Back

</a>

</form>

</div>

</div>

</div>

{% endblock %}
