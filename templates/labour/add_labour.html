{% extends "base.html" %}

{% block content %}

<div class="container-fluid mt-3">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h4 class="mb-0">

Register Labour

</h4>

</div>

<div class="card-body">

<form method="POST">

<div class="row">

<div class="col-md-2 mb-3">

<label>Labour Code</label>

<input
type="text"
class="form-control"
value="Auto Generated"
readonly>

</div>

<div class="col-md-5 mb-3">

<label>Labour Name</label>

<input
type="text"
name="labour_name"
class="form-control"
required>

</div>

<div class="col-md-5 mb-3">

<label>Father's Name</label>

<input
type="text"
name="father_name"
class="form-control">

</div>

</div>

<div class="row">

<div class="col-md-2 mb-3">

<label>Gender</label>

<select
name="gender"
class="form-select">

<option value="">Select</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Other">Other</option>

</select>

</div>

<div class="col-md-3 mb-3">

<label>Date of Birth</label>

<input
type="date"
name="date_of_birth"
class="form-control">

</div>

<div class="col-md-2 mb-3">

<label>Blood Group</label>

<select
name="blood_group"
class="form-select">

<option value="">Select</option>

<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>

</select>

</div>

<div class="col-md-5 mb-3">

<label>Aadhar No</label>

<input
type="text"
name="aadhar_no"
class="form-control">

</div>

</div>

<hr>

<h5>

Address

</h5>

<div class="row">

<div class="col-md-12 mb-3">

<label>Address</label>

<textarea
name="address"
rows="2"
class="form-control"></textarea>

</div>

</div>

<div class="row">

<div class="col-md-4 mb-3">

<label>City</label>

<input
type="text"
name="city"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label>State</label>

<input
type="text"
name="state"
class="form-control">

</div>

<div class="col-md-4 mb-3">

<label>Pincode</label>

<input
type="text"
name="pincode"
class="form-control">

</div>

</div>

<div class="row">

<div class="col-md-4 mb-3">

<label>Mobile</label>

<input
type="text"
name="mobile"
class="form-control">

</div>

</div>

<hr>

<h5 class="text-primary">

Employment Details

</h5>

<div class="row">

    <div class="col-md-6 mb-3">

        <label>Labour Type</label>

        <select
            name="labour_type_id"
            class="form-select"
            required>

            <option value="">Select Labour Type</option>

            {% for row in types %}

            <option value="{{ row.id }}">

                {{ row.type_name }}

            </option>

            {% endfor %}

        </select>

    </div>

    <div class="col-md-6 mb-3">

        <label>Contractor</label>

        <select
            name="contractor_id"
            class="form-select"
            required>

            <option value="">Select Contractor</option>

            {% for row in contractors %}

            <option value="{{ row.id }}">

                {{ row.contractor_name }}

            </option>

            {% endfor %}

        </select>

    </div>

</div>

<hr>

<h5 class="text-primary">

Rate Details

</h5>

<div class="row">

    <div class="col-md-6 mb-3">

        <label>

            Hourly Wage Rate

        </label>

        <input
            type="number"
            step="0.01"
            min="0"
            name="hourly_rate"
            class="form-control"
            value="0">

        <small class="text-muted">

            Used when labour is paid on hourly basis.

        </small>

    </div>

    <div class="col-md-6 mb-3">

        <label>

            Contractor Billing Rate (Per Hour)

        </label>

        <input
            type="number"
            step="0.01"
            min="0"
            name="contractor_rate"
            class="form-control"
            value="0">

        <small class="text-muted">

            Rate charged by contractor to the company.

        </small>

    </div>

</div>

<hr>

<div class="form-check mb-3">

    <input
        class="form-check-input"
        type="checkbox"
        name="active"
        checked>

    <label class="form-check-label">

        Active

    </label>

</div>

<button
    type="submit"
    class="btn btn-primary">

    Save Labour

</button>

<a
    href="{{ url_for('labour.labour_master_list') }}"
    class="btn btn-secondary">

    Back

</a>

</form>

</div>

</div>

</div>

<script>

document.getElementById("wage_type").addEventListener(

"change",

function(){

    if(this.value=="PIECE"){

        document.getElementById("daily_wage_rate").disabled=true;

        document.getElementById("daily_wage_rate").value=0;

    }

    else{

        document.getElementById("daily_wage_rate").disabled=false;

    }

}

);

</script>

{% endblock %}
