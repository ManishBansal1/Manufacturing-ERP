{% extends "base.html" %}

{% block content %}

<div class="container mt-3">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h4>Add Labour Contractor</h4>

</div>

<div class="card-body">

<form method="POST">

<div class="row">

<div class="col-md-3 mb-3">

<label>Contractor Code</label>

<input type="text"
name="contractor_code"
class="form-control">

</div>

<div class="col-md-9 mb-3">

<label>Contractor Name</label>

<input type="text"
name="contractor_name"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Contact Person</label>

<input type="text"
name="contact_person"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Mobile</label>

<input type="text"
name="mobile"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<input type="email"
name="email"
class="form-control">

</div>

<div class="col-md-3 mb-3">

<label>GST No</label>

<input type="text"
name="gst_no"
class="form-control">

</div>

<div class="col-md-3 mb-3">

<label>PAN No</label>

<input type="text"
name="pan_no"
class="form-control">

</div>

<div class="col-md-12 mb-3">

<label>Address</label>

<textarea name="address"
rows="3"
class="form-control"></textarea>

</div>

<div class="col-md-6 mb-3">

<label>City</label>

<input type="text"
name="city"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>State</label>

<input type="text"
name="state"
class="form-control">

</div>

</div>

<div class="form-check mb-3">

<input class="form-check-input"
type="checkbox"
name="active"
checked>

<label class="form-check-label">

Active

</label>

</div>

<button class="btn btn-primary">

Save

</button>

<a href="{{ url_for('labour.labour_contractors') }}"
class="btn btn-secondary">

Back

</a>

</form>

</div>

</div>

</div>

{% endblock %}
