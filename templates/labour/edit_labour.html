{% extends "base.html" %}

{% block content %}

<div class="container-fluid mt-3">

<div class="card shadow">

<div class="card-header bg-warning text-dark">

<h4>

Edit Labour

</h4>

</div>

<div class="card-body">

<form method="POST">

<h5 class="text-primary">

Personal Details

</h5>

<div class="row">

<div class="col-md-2 mb-3">

<label>

Labour Code

</label>

<input
type="text"
class="form-control"
value="{{ labour.labour_code }}"
readonly>

</div>

<div class="col-md-5 mb-3">

<label>

Labour Name

</label>

<input
type="text"
name="labour_name"
class="form-control"
required
value="{{ labour.labour_name }}">

</div>

<div class="col-md-5 mb-3">

<label>

Father Name

</label>

<input
type="text"
name="father_name"
class="form-control"
value="{{ labour.father_name }}">

</div>

</div>

<div class="row">

<div class="col-md-2 mb-3">

<label>

Gender

</label>

<select
name="gender"
class="form-select">

<option value="Male"
{% if labour.gender=="Male" %}selected{% endif %}>

Male

</option>

<option value="Female"
{% if labour.gender=="Female" %}selected{% endif %}>

Female

</option>

<option value="Other"
{% if labour.gender=="Other" %}selected{% endif %}>

Other

</option>

</select>

</div>

<div class="col-md-2 mb-3">

<label>

Date of Birth

</label>

<input
type="date"
name="date_of_birth"
class="form-control"
value="{% if labour.date_of_birth %}{{ labour.date_of_birth.strftime('%Y-%m-%d') }}{% endif %}">

</div>

<div class="col-md-2 mb-3">

<label>

Age

</label>

<input
type="number"
class="form-control"
readonly
value="{{ labour.age or '' }}">

</div>

<div class="col-md-2 mb-3">

<label>

Blood Group

</label>

<input
type="text"
name="blood_group"
class="form-control"
value="{{ labour.blood_group }}">

</div>

<div class="col-md-4 mb-3">

<label>

Aadhar No

</label>

<input
type="text"
name="aadhar_no"
class="form-control"
value="{{ labour.aadhar_no }}">

</div>

</div>

<div class="row">

<div class="col-md-3 mb-3">

<label>

Mobile

</label>

<input
type="text"
name="mobile"
class="form-control"
value="{{ labour.mobile }}">

</div>

<div class="col-md-9 mb-3">

<label>

Address

</label>

<input
type="text"
name="address"
class="form-control"
value="{{ labour.address }}">

</div>

</div>

<div class="row">

<div class="col-md-4 mb-3">

<label>

City

</label>

<input
type="text"
name="city"
class="form-control"
value="{{ labour.city }}">

</div>

<div class="col-md-4 mb-3">

<label>

State

</label>

<input
type="text"
name="state"
class="form-control"
value="{{ labour.state }}">

</div>

<div class="col-md-4 mb-3">

<label>

Pincode

</label>

<input
type="text"
name="pincode"
class="form-control"
value="{{ labour.pincode }}">

</div>

</div>

<hr>

<h5 class="text-primary">

Work Details

</h5>

<div class="row">

<div class="col-md-4 mb-3">

<label>

Labour Type

</label>

<select
name="labour_type_id"
class="form-select">

{% for t in types %}

<option
value="{{ t.id }}"
{% if labour.labour_type_id==t.id %}selected{% endif %}>

{{ t.type_name }}

</option>

{% endfor %}

</select>

</div>

<div class="col-md-4 mb-3">

<label>

Contractor

</label>

<select
name="contractor_id"
class="form-select">

{% for c in contractors %}

<option
value="{{ c.id }}"
{% if labour.contractor_id==c.id %}selected{% endif %}>

{{ c.contractor_name }}

</option>

{% endfor %}

</select>

</div>

<div class="col-md-4 mb-3">

<label>

Location

</label>

<select
name="location_id"
class="form-select">

{% for l in locations %}

<option
value="{{ l.id }}"
{% if labour.location_id==l.id %}selected{% endif %}>

{{ l.location_name }}

</option>

{% endfor %}

</select>

</div>

</div>

<hr>

<h5 class="text-primary">

Rate Details

</h5>

<div class="row">

<div class="col-md-4 mb-3">

<label>

Wage Type

</label>

<select
name="wage_type"
id="wage_type"
class="form-select">

<option
value="DAILY"
{% if labour.wage_type=="DAILY" %}selected{% endif %}>

Daily Wages

</option>

<option
value="PIECE"
{% if labour.wage_type=="PIECE" %}selected{% endif %}>

Piece Rate

</option>

</select>

</div>

<div class="col-md-4 mb-3">

<label>

Daily Wage Rate

</label>

<input
type="number"
step="0.01"
name="daily_wage_rate"
id="daily_wage_rate"
class="form-control"
value="{{ labour.daily_wage_rate }}">

</div>

<div class="col-md-4 mb-3">

<label>

Contractor Billing Rate

</label>

<input
type="number"
step="0.01"
name="contractor_rate"
class="form-control"
value="{{ labour.contractor_rate }}">

</div>

</div>

<hr>

<div class="form-check mb-3">

<input
class="form-check-input"
type="checkbox"
name="active"
{% if labour.active %}checked{% endif %}>

<label class="form-check-label">

Active

</label>

</div>

<button
type="submit"
class="btn btn-primary">

Update Labour

</button>

<a
href="{{ url_for('labour.labour_master_list') }}"
class="btn btn-secondary">

Back

</a>

</form>

</div>

</div>

</div>

<script>

function toggleDailyRate(){

    if(document.getElementById("wage_type").value=="PIECE"){

        document.getElementById("daily_wage_rate").disabled=true;

    }

    else{

        document.getElementById("daily_wage_rate").disabled=false;

    }

}

document.getElementById("wage_type").addEventListener(

"change",

toggleDailyRate

);

toggleDailyRate();

</script>

{% endblock %}
