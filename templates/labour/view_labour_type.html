{% extends "base.html" %}

{% block content %}

<div class="container mt-3">

<div class="card shadow">

<div class="card-header bg-info text-white">

<h4>View Labour Type</h4>

</div>

<div class="card-body">

<table class="table table-bordered">

<tr>

<th width="25%">Type Code</th>

<td>{{ labour_type.type_code }}</td>

</tr>

<tr>

<th>Type Name</th>

<td>{{ labour_type.type_name }}</td>

</tr>

<tr>

<th>Description</th>

<td>{{ labour_type.description }}</td>

</tr>

<tr>

<th>Status</th>

<td>

{% if labour_type.active %}

<span class="badge bg-success">

Active

</span>

{% else %}

<span class="badge bg-danger">

Inactive

</span>

{% endif %}

</td>

</tr>

</table>

<a
href="{{ url_for('labour.labour_types') }}"
class="btn btn-secondary">

Back

</a>

</div>

</div>

</div>

{% endblock %}
