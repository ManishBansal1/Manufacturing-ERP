{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>Add Recipe</h2>

<form method="POST">

<div class="mb-3">

<label>Recipe Name</label>

<input
type="text"
name="recipe_name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Output Item</label>

<select
name="output_item_id"
class="form-control"
required>

<option value="">
Select Item
</option>

{% for item in item_list %}

<option value="{{ item.id }}">

{{ item.item_name }}

</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label>Production Stage</label>

<select
name="production_stage_id"
class="form-control"
required>

<option value="">
Select Stage
</option>

{% for stage in stage_list %}

<option value="{{ stage.id }}">

{{ stage.stage_no }}
-
{{ stage.stage_name }}

</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label>Output Quantity</label>

<input
type="number"
step="0.001"
name="output_qty"
value="1"
class="form-control"
required>

</div>

<button
type="submit"
class="btn btn-success">

Save Recipe

</button>

<a
href="/recipes"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

{% endblock %}
