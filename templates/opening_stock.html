{% extends "base.html" %}

{% block content %}

<h2>

Opening Stock

</h2>

<a
href="/opening-stock/add"
class="btn btn-primary mb-3">

Add Opening Stock

</a>

<table class="table table-bordered">

<thead>

<tr>

<th>Date</th>

<th>Location</th>

<th>Remarks</th>

<th>View</th>

<th>Delete</th>

</tr>

</thead>

<tbody>

{% for row in opening_list %}

<tr>

<td>

{{ row.opening_date }}

</td>

<td>

{{ row.location.location_name }}

</td>

<td>

{{ row.remarks }}

</td>

<td>

<a
href="/opening-stock/view/{{ row.id }}"
class="btn btn-info btn-sm">

View

</a>

</td>

<td>

<button
class="btn btn-danger btn-sm">

Delete

</button>

</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
