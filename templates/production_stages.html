{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>Production Stages</h2>

<a href="/production-stages/add"
   class="btn btn-primary mb-3">

Add Stage

</a>

<table class="table table-bordered">

<thead>

<tr>

<th>Stage No</th>
<th>Stage Name</th>
<th>Action</th>

</tr>

</thead>

<tbody>

{% for stage in stage_list %}

<tr>

<td>{{ stage.stage_no }}</td>
<td>{{ stage.stage_name }}</td>

<td>

<a href="/production-stages/edit/{{ stage.id }}"
   class="btn btn-warning btn-sm">

Edit

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
