{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<h2>Add Destination</h2>

<form method="POST">

<div class="row">



<div class="col-md-9 mb-3">

<label>Destination Name</label>

<input
type="text"
name="destination_name"
class="form-control"
required>

</div>

<div class="col-md-4 mb-3">

<label>State</label>

<input
type="text"
name="state_name"
class="form-control">

</div>



<div class="col-md-4 mb-3">

<div class="form-check mt-4">

<input
class="form-check-input"
type="checkbox"
name="active"
checked>

<label class="form-check-label">

Active

</label>

</div>

</div>

</div>

<button
class="btn btn-success">

Save

</button>

<a
href="/destination"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

{% endblock %}
